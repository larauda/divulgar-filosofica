media:
  input: public/uploads
  output: /uploads
  categories: [image]
  extensions: [jpg, jpeg, png, webp]
  rename: safe

content:
  - name: reflexiones
    label: Reflexiones
    type: collection
    path: src/data/post
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"

    view:
      fields: [title, publishDate, category, author]
      primary: title
      sort: [publishDate, title]
      default:
        sort: publishDate
        order: desc

    fields:
      - name: title
        label: Título
        type: string
        required: true

      - name: excerpt
        label: Resumen
        type: text
        required: true

      - name: category
        label: Categoría
        type: select
        required: true
        options:
          values:
            - Filosofía
            - Feminismos
            - Política
            - Cuidados
            - Ecofeminismo
            - Comunidad

      - name: tags
        label: Etiquetas
        type: string
        list: true
        required: false

      - name: image
        label: Imagen principal
        type: image
        required: true

      - name: publishDate
        label: Fecha de publicación
        type: date
        required: true

      - name: author
        label: Autora
        type: string
        required: true

      - name: body
        label: Contenido
        type: rich-text
        required: true
        options:
          format: markdown
          rename: safe

  - name: actividades
    label: Actividades
    type: collection
    path: src/data/activities
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"

    view:
      fields: [title, date, type, status]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Nombre de la actividad
        type: string
        required: true

      - name: type
        label: Tipo
        type: select
        required: true
        options:
          values:
            - Taller
            - Grupo de estudio
            - Charla
            - Encuentro

      - name: image
        label: Afiche o imagen
        type: image
        required: true

      - name: date
        label: Fecha
        type: date
        required: false

      - name: modality
        label: Modalidad
        type: select
        required: true
        options:
          values:
            - Presencial
            - Online
            - Híbrida

      - name: location
        label: Lugar
        type: string
        required: false

      - name: status
        label: Estado
        type: select
        required: true
        options:
          values:
            - Inscripciones abiertas
            - Próximamente
            - Finalizada
            - Próxima edición

      - name: registrationUrl
        label: Enlace de inscripción
        type: string
        required: false

      - name: excerpt
        label: Descripción breve
        type: text
        required: true

      - name: gallery
        label: Galería relacionada
        type: reference
        required: false
        description: Selecciona el álbum fotográfico asociado a esta actividad.
        options:
          collection: galeria
          search: "title"
          value: "{name}"
          label: "{primary}"

      - name: body
        label: Información completa
        type: rich-text
        required: false
        options:
          format: markdown
          rename: safe

  - name: agenda
    label: Agenda Filosófica
    type: collection
    path: src/data/agenda
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"

    view:
      fields: [title, date, type, organizer, status]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Nombre de la actividad
        type: string
        required: true

      - name: type
        label: Tipo de actividad
        type: select
        required: true
        options:
          values:
            - Conversatorio
            - Charla
            - Taller
            - Seminario
            - Congreso
            - Coloquio
            - Lanzamiento
            - Convocatoria
            - Ciclo
            - Encuentro
            - Otra

      - name: organizer
        label: Organización responsable
        type: string
        required: true
        description: Indica la institución, colectiva u organización que realiza la actividad.

      - name: image
        label: Afiche o imagen
        type: image
        required: true

      - name: date
        label: Fecha
        type: date
        required: false

      - name: time
        label: Hora
        type: string
        required: false
        description: "Ejemplo: 18:30 hrs."

      - name: modality
        label: Modalidad
        type: select
        required: true
        options:
          values:
            - Presencial
            - Online
            - Híbrida

      - name: location
        label: Lugar
        type: string
        required: false

      - name: status
        label: Estado
        type: select
        required: true
        options:
          values:
            - Inscripciones abiertas
            - Próximamente
            - Hoy
            - Finalizada
            - Convocatoria abierta

      - name: registrationUrl
        label: Enlace de información o inscripción
        type: string
        required: false

      - name: excerpt
        label: Descripción breve
        type: text
        required: true

      - name: featured
        label: Destacar actividad
        type: boolean
        required: false
        default: false
        description: Actívalo para mostrar esta actividad de manera destacada.

      - name: body
        label: Información completa
        type: rich-text
        required: false
        options:
          format: markdown
          rename: safe

  - name: galeria
    label: Galería
    type: collection
    path: src/data/gallery
    format: yaml-frontmatter
    filename: "{year}-{month}-{day}-{primary}.md"

    view:
      fields: [title, date]
      primary: title
      sort: [date, title]
      default:
        sort: date
        order: desc

    fields:
      - name: title
        label: Nombre del álbum
        type: string
        required: true

      - name: date
        label: Fecha
        type: date
        required: false

      - name: description
        label: Descripción
        type: text
        required: false

      - name: cover
        label: Imagen de portada
        type: image
        required: true

      - name: photos
        label: Fotografías
        type: image
        list: true
        required: true